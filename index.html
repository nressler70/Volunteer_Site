<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Team A - Burkhart Road</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#f0f6fc;min-height:100vh;}

/* ── PAGE HEADER ── */
.pg-header{background:#C1121F;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.pg-badge{background:rgba(255,255,255,.22);border-radius:8px;padding:5px 12px;font-weight:800;font-size:22px;color:#fff;flex-shrink:0;}
.pg-info{flex:1;min-width:0;}
.pg-info h1{font-size:15px;font-weight:700;color:#fff;}
.pg-info p{font-size:11px;color:rgba(255,255,255,.8);margin-top:1px;}
.pg-stats{display:flex;gap:6px;flex-shrink:0;}
.pstat{background:rgba(255,255,255,.18);border-radius:14px;padding:4px 9px;text-align:center;}
.pstat .n{font-size:16px;font-weight:800;color:#fff;line-height:1;}
.pstat .l{font-size:9px;color:rgba(255,255,255,.8);}
.pstat.gn{background:rgba(40,164,78,.6);}

/* ── ACTION TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#161b22;border-bottom:1px solid #21262d;flex-wrap:wrap;}
.toolbar input{flex:1;min-width:120px;padding:8px 12px;background:#0d1117;border:1.5px solid #30363d;border-radius:8px;color:#f0f6fc;font-size:14px;outline:none;-webkit-appearance:none;}
.toolbar input::placeholder{color:#6e7681;}
.exp-btn{padding:9px 14px;background:#2da44e;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.exp-btn svg{width:16px;height:16px;fill:#fff;}
.map-btn{padding:9px 14px;background:#1D3557;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* ── FILTER PILLS ── */
.filters{display:flex;gap:6px;padding:8px 12px;background:#0d1117;border-bottom:1px solid #21262d;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.fp{flex-shrink:0;padding:6px 12px;border-radius:16px;border:1.5px solid #30363d;background:transparent;color:rgba(255,255,255,.55);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.fp.on{background:#C1121F;border-color:#C1121F;color:#fff;}

/* ── SECTION HEADER ── */
.sec{padding:8px 14px;font-size:11px;font-weight:700;color:#6e7681;letter-spacing:.8px;text-transform:uppercase;background:#161b22;border-bottom:1px solid #21262d;border-top:1px solid #21262d;}

/* ── STOP CARD ── */
.sc{display:flex;align-items:stretch;border-bottom:1px solid #161b22;background:#0d1117;cursor:pointer;}
.sc:active{background:#161b22;}
.sc-left{width:54px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border-right:3px solid #1e2a38;}
.sc-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
.sc-vl{font-size:9px;font-weight:700;margin-top:4px;color:rgba(255,255,255,.4);}
.sc-body{flex:1;padding:10px 10px 10px 12px;min-width:0;}
.sc-row1{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px;}
.sc-name{font-size:15px;font-weight:700;color:#f0f6fc;}
.bdg{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.bL{background:#FFD700;color:#1a1a1a;}
.bH{background:#1a6b2a;color:#fff;}
.sc-addr{font-size:12px;color:#8b949e;margin-bottom:2px;}
.sc-meta{font-size:11px;color:#58a6a0;font-weight:600;}
.sc-sts{font-size:11px;font-weight:700;margin-top:3px;}
.sc-right{width:50px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nav-btn{width:38px;height:38px;border-radius:50%;background:#C1121F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.nav-btn svg{width:20px;height:20px;fill:#fff;}

/* ── MODAL OVERLAY ── */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:5000;background:rgba(0,0,0,.7);-webkit-overflow-scrolling:touch;}
.modal.open{display:flex;align-items:flex-end;}
.modal-sheet{background:#161b22;border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:16px 16px 40px;border-top:3px solid #C1121F;box-shadow:0 -6px 30px rgba(0,0,0,.8);}
.modal-close{float:right;background:rgba(255,255,255,.1);border:none;color:#aaa;width:32px;height:32px;border-radius:50%;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mc-lbl{font-size:11px;font-weight:700;color:#C1121F;text-transform:uppercase;margin-bottom:3px;clear:both;}
.mc-name{font-size:24px;font-weight:800;color:#f0f6fc;margin-bottom:3px;line-height:1.1;}
.mc-addr{font-size:14px;color:#8b949e;margin-bottom:5px;}
.mc-levy{font-size:13px;color:#58a6a0;font-weight:700;margin-bottom:10px;}
.mc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.mc-bdg{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;}
.mcbL{background:#FFD700;color:#1a1a1a;}
.mcbH{background:#1a6b2a;color:#fff;}
.mcbV{background:#1D3557;color:#fff;}
.nav-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.nb{padding:14px 8px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.nb svg{width:20px;height:20px;fill:currentColor;}
.nb:active{opacity:.8;}
.nbG{background:#4285F4;color:#fff;}
.nbA{background:#e8e8ed;color:#1d1d1f;}
.field-lbl{font-size:11px;font-weight:700;color:#6e7681;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.notes-ta{width:100%;padding:10px 12px;background:#0d1117;border:1.5px solid #30363d;border-radius:10px;color:#f0f6fc;font-size:14px;outline:none;resize:none;font-family:inherit;margin-bottom:14px;}
.sts-row{display:flex;gap:8px;margin-bottom:4px;}
.sb{flex:1;padding:12px 4px;border-radius:10px;border:1.5px solid #30363d;background:transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;}
.sbY{background:#1a6b2a !important;border-color:#1a6b2a !important;color:#fff !important;}
.sbN{background:#6b1a1a !important;border-color:#6b1a1a !important;color:#fff !important;}
.sbNH{background:#6b4e1a !important;border-color:#6b4e1a !important;color:#fff !important;}
.sbU{background:#3d3880 !important;border-color:#3d3880 !important;color:#fff !important;}

/* ── MAP OVERLAY ── */
#map-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:4000;flex-direction:column;}
#map-overlay.open{display:flex;}
#map-topbar{background:#C1121F;height:50px;display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;}
#map-topbar button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
#map-topbar span{color:#fff;font-size:14px;font-weight:700;flex:1;}
#map{flex:1;width:100%;}

/* ── EXPORT MODAL ── */
#exp-modal .modal-sheet{max-height:80vh;}
#exp-csv-text{width:100%;height:180px;background:#0d1117;border:1.5px solid #30363d;border-radius:8px;color:#58a6a0;font-size:11px;padding:10px;font-family:monospace;resize:none;margin-bottom:10px;}
.copy-btn{width:100%;padding:14px;background:#2da44e;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.copy-btn:active{opacity:.85;}
.dl-hint{font-size:12px;color:#6e7681;text-align:center;line-height:1.5;}

/* ── TOAST ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2da44e;color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:20px;z-index:99999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap;}
</style>
</head>

<!-- TOOLBAR -->
<div class="toolbar">

</div>

<!-- FILTERS -->
<div class="filters">

  <button class="fp" data-f="done" onclick="setF(this)">Visited</button>
</div>

<!-- STOP LIST -->
<div id="lcon"></div>

<!-- STOP DETAIL MODAL -->
<div class="modal" id="stop-modal" onclick="modalBgClick(event)">

    <div class="mc-name" id="mc-name"></div>
    <div class="mc-addr" id="mc-addr"></div>
    <div class="mc-levy" id="mc-levy"></div>
    <div class="mc-badges" id="mc-badges"></div>
    <div class="nav-btns">
      <button class="nb nbG" id="btn-gm">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        Google Maps
      </button>
      <button class="nb nbA" id="btn-am">

        Apple Maps
      </button>
    </div>
    <div class="field-lbl">Notes (optional):</div>
    <textarea class="notes-ta" id="mc-notes" rows="2" placeholder="Yard sign request, call back, etc..."></textarea>
    <div class="field-lbl">Mark this stop:</div>
    <div class="sts-row" id="mc-sts"></div>
  </div>
</div>

<!-- MAP OVERLAY -->
<div id="map-overlay">
  <div id="map-topbar">
    <span>Team A Map</span>
    <button onclick="closeMap()">&#8592; Back to List</button>
  </div>
  <div id="map"></div>
</div>

<!-- EXPORT MODAL -->
<div class="modal" id="exp-modal" onclick="modalBgClick(event)">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeModal('exp-modal')">X</button>
    <div class="mc-lbl">Export Results - Team A</div>
    <div class="mc-name" style="font-size:16px;margin-bottom:12px;" id="exp-summary-line">0 of 91 stops marked</div>
    <div class="field-lbl">Your CSV data:</div>
    <textarea id="exp-csv-text" readonly></textarea>
    <button class="copy-btn" onclick="copyCSV()">Copy All to Clipboard</button>
    <button class="copy-btn" style="background:#1D3557;" onclick="tryDownload()">Download CSV File</button>
    <div class="dl-hint" id="dl-hint">Paste into a new spreadsheet, or share this text with campaign HQ.</div>
  </div>
</div>

<div id="toast"></div>

// ─── BUILD LIST ──────────────────────────────────────────────
function buildList() {
  var con = document.getElementById('lcon');
  con.innerHTML = '';
  var h1 = document.createElement('div');
  h1.className = 'sec'; h1.id = 'hv1';
  h1.textContent = 'Volunteer A-1  --  Stops 1 to ' + V1N;
  con.appendChild(h1);
  var v2done = false;
  for (var i = 0; i < STOPS.length; i++) {
    var s = STOPS[i];
    if (!s.v1 && !v2done) {
      v2done = true;
      var h2 = document.createElement('div');
      h2.className = 'sec'; h2.id = 'hv2';
      h2.textContent = 'Volunteer A-2  --  Stops ' + (V1N + 1) + ' to ' + STOPS.length;
      con.appendChild(h2);
    }
    var card = makeCard(i);
    con.appendChild(card);
  }
}

function makeCard(i) {
  var s = STOPS[i];
  var card = document.createElement('div');
  card.className = 'sc';
  card.id = 'card' + i;
  card.setAttribute('data-i', '' + i);
  card.setAttribute('data-v', s.v1 ? 'v1' : 'v2');
  card.setAttribute('data-l', s.likely ? '1' : '0');

  // left
  var L = document.createElement('div'); L.className = 'sc-left';
  var num = document.createElement('div'); num.className = 'sc-num';
  num.id = 'num' + i;
  num.textContent = '' + s.stop;
  num.style.cssText = 'background:' + (s.likely ? '#FFD700' : '#C1121F') +
    ';color:' + (s.likely ? '#1a1a1a' : '#fff') +
    ';opacity:' + (s.v1 ? '1' : '0.65') +
    ';border:2.5px solid rgba(255,255,255,.3);';
  var vl = document.createElement('div'); vl.className = 'sc-vl';
  vl.textContent = s.v1 ? 'A-1' : 'A-2';
  L.appendChild(num); L.appendChild(vl);
  card.appendChild(L);

  // body
  var B = document.createElement('div'); B.className = 'sc-body';
  var r1 = document.createElement('div'); r1.className = 'sc-row1';
  var nm = document.createElement('span'); nm.className = 'sc-name'; nm.textContent = s.name;
  r1.appendChild(nm);
  if (s.likely) { var bl = document.createElement('span'); bl.className = 'bdg bL'; bl.textContent = 'LIKELY'; r1.appendChild(bl); }
  var bh = document.createElement('span'); bh.className = 'bdg bH'; bh.textContent = 'HO'; r1.appendChild(bh);
  var ad = document.createElement('div'); ad.className = 'sc-addr'; ad.textContent = s.addr;
  var mt = document.createElement('div'); mt.className = 'sc-meta';
  mt.textContent = '$' + s.levy.toFixed(2) + '/yr  -  ' + s.hh + ' voter' + (s.hh > 1 ? 's' : '');
  var sl = document.createElement('div'); sl.className = 'sc-sts'; sl.id = 'sl' + i;
  B.appendChild(r1); B.appendChild(ad); B.appendChild(mt); B.appendChild(sl);
  card.appendChild(B);

  // right
  var R = document.createElement('div'); R.className = 'sc-right';
  var nb = document.createElement('button'); nb.className = 'nav-btn'; nb.title = 'Navigate';
  nb.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/></svg>';
  (function(idx) {
    nb.addEventListener('click', function(e) { e.stopPropagation(); openStop(idx); });
    card.addEventListener('click', function() { openStop(idx); });
  })(i);
  R.appendChild(nb); card.appendChild(R);
  return card;

// ─── STOP MODAL ──────────────────────────────────────────────
function openStop(idx) {
  var s = STOPS[idx]; curIdx = idx;
  var rec = sts[idx] || {};
  document.getElementById('mc-lbl').textContent = 'Stop ' + s.stop + '  -  Volunteer ' + (s.v1 ? 'A-1' : 'A-2');
  document.getElementById('mc-name').textContent = s.name;
  document.getElementById('mc-addr').textContent = s.addr;
  document.getElementById('mc-levy').textContent = 'Annual levy: $' + s.levy.toFixed(2) + '  ($' + (s.levy / 12).toFixed(2) + '/mo)  -  ' + s.hh + ' voter' + (s.hh > 1 ? 's' : '');

  var bd = document.getElementById('mc-badges'); bd.innerHTML = '';
  if (s.likely) { var b1 = document.createElement('span'); b1.className = 'mc-bdg mcbL'; b1.textContent = 'LIKELY VOTER'; bd.appendChild(b1); }
  var b2 = document.createElement('span'); b2.className = 'mc-bdg mcbH'; b2.textContent = 'PERSONALIZED HANDOUT'; bd.appendChild(b2);
  var b3 = document.createElement('span'); b3.className = 'mc-bdg mcbV'; b3.textContent = 'Volunteer ' + (s.v1 ? 'A-1' : 'A-2'); bd.appendChild(b3);

  document.getElementById('btn-gm').onclick = function() {
    window.open('https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(s.nav) + '&travelmode=driving', '_blank');
  };
  document.getElementById('btn-am').onclick = function() {
    window.location.href = 'maps://maps.apple.com/?daddr=' + encodeURIComponent(s.nav) + '&dirflg=d';
  };

  var ta = document.getElementById('mc-notes');
  ta.value = rec.notes || '';
  ta.oninput = function() { saveNote(idx, ta.value); };

  var sr = document.getElementById('mc-sts'); sr.innerHTML = '';
  var opts = [{k:'Y',t:'Yes'},{k:'N',t:'No'},{k:'NH',t:'Not Home'},{k:'U',t:'Unsure'}];
  var cur = rec.code || '';
  opts.forEach(function(o) {
    var b = document.createElement('button');
    b.className = 'sb' + (cur === o.k ? ' sb' + o.k : '');
    b.textContent = o.t;
    b.addEventListener('click', function() { markStop(idx, o.k); });
    sr.appendChild(b);
  });

  document.getElementById('stop-modal').classList.add('open');
}

function saveNote(idx, val) {
  if (!sts[idx]) sts[idx] = {};
  sts[idx].notes = val.trim();
  refreshLabel(idx);
}

function markStop(idx, code) {
  if (!sts[idx]) sts[idx] = {};
  sts[idx].code = (sts[idx].code === code) ? '' : code;
  refreshLabel(idx);
  updateProgress();
  if (lmk[idx]) lmk[idx].setIcon(mkIcon(STOPS[idx]));
  openStop(idx); // refresh buttons
}

function refreshLabel(idx) {
  var rec = sts[idx] || {};
  var el = document.getElementById('sl' + idx);
  if (!el) return;
  var code = rec.code || '';
  var notes = rec.notes || '';
  var cmap = {Y:'Yes - Will Vote YES', N:'No', NH:'Not Home', U:'Unsure - Follow Up'};
  var txt = cmap[code] || '';
  if (notes) txt = txt + (txt ? ' | ' : '') + notes.substring(0, 28) + (notes.length > 28 ? '...' : '');
  el.textContent = txt;
  el.style.color = code === 'Y' ? '#2da44e' : code === 'N' ? '#da3633' : code === 'NH' ? '#e3b341' : code === 'U' ? '#7c6fcd' : '#6e7681';
  // Update number circle color to show status
  var numEl = document.getElementById('num' + idx);
  if (numEl && code) {
    var dotColors = {Y:'#2da44e', N:'#da3633', NH:'#e3b341', U:'#7c6fcd'};
    numEl.style.borderColor = dotColors[code];
    numEl.style.borderWidth = '3px';
  }
}

function updateProgress() {
  var done = Object.keys(sts).filter(function(k) { return sts[k] && sts[k].code; }).length;
  document.getElementById('done-n').textContent = done;
  var txt = done + ' of ' + TOTAL + ' stops marked';
  var el = document.getElementById('exp-summary-line');
  if (el) el.textContent = txt;
}

// ─── FILTER + SEARCH ─────────────────────────────────────────
function setF(btn) {
  document.querySelectorAll('.fp').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  applyF();
}

function applyF() {
  var q = document.getElementById('srch').value.toLowerCase();
  var cf = (document.querySelector('.fp.on') || {}).getAttribute ? document.querySelector('.fp.on').getAttribute('data-f') : 'all';
  var cards = document.querySelectorAll('.sc');
  var v1v = false, v2v = false;
  cards.forEach(function(card) {
    var i = parseInt(card.getAttribute('data-i'));
    var s = STOPS[i]; var code = (sts[i] && sts[i].code) || '';
    var show = true;
    if (cf === 'v1') show = s.v1;
    else if (cf === 'v2') show = !s.v1;
    else if (cf === 'likely') show = s.likely;
    else if (cf === 'todo') show = !code;
    else if (cf === 'done') show = !!code;
    if (show && q) show = (s.name + ' ' + s.addr).toLowerCase().indexOf(q) >= 0;
    card.style.display = show ? '' : 'none';
    if (show) { if (s.v1) v1v = true; else v2v = true; }
  });
  var h1 = document.getElementById('hv1'), h2 = document.getElementById('hv2');
  if (h1) h1.style.display = v1v ? '' : 'none';
  if (h2) h2.style.display = v2v ? '' : 'none';
}
document.getElementById('srch').addEventListener('input', applyF);

// ─── MODALS ──────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  curIdx = -1;
}
function modalBgClick(e) {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('open');
    curIdx = -1;
  }
}

// ─── MAP ─────────────────────────────────────────────────────
function openMap() {
  document.getElementById('map-overlay').classList.add('open');
  if (!mapReady) {
    mapReady = true;
    lmap = L.map('map', {center:[CLAT,CLON], zoom:13, zoomControl:false, tap:true});
    L.control.zoom({position:'bottomright'}).addTo(lmap);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {attribution:'(c) OpenStreetMap', maxZoom:19}).addTo(lmap);
    if (V1C.length > 1) L.polyline(V1C, {color:'#C1121F', weight:4, opacity:.8}).addTo(lmap);
    if (V2C.length > 1) L.polyline(V2C, {color:'#C1121F', weight:3, opacity:.4, dashArray:'10 7'}).addTo(lmap);
    STOPS.forEach(function(s) {
      if (!s.lat || !s.lon) { lmk.push(null); return; }
      var m = L.marker([s.lat, s.lon], {icon: mkIcon(s)}).addTo(lmap);
      (function(idx) {
        m.on('click', function(e) {
          L.DomEvent.stopPropagation(e);
          openStop(idx);
          lmap.setView([s.lat, s.lon], Math.max(lmap.getZoom(), 16));
        });
      })(s.i);
      lmk.push(m);
    });
    var coords = STOPS.filter(function(s){return s.lat&&s.lon;}).map(function(s){return[s.lat,s.lon];});
    if (coords.length) lmap.fitBounds(L.latLngBounds(coords), {padding:[20,20]});
  }
  setTimeout(function() { if (lmap) lmap.invalidateSize(); }, 80);
}

function closeMap() {
  document.getElementById('map-overlay').classList.remove('open');
}

function mkIcon(s) {
  var sv = (sts[s.i] && sts[s.i].code) || '';
  var bg = s.likely ? '#FFD700' : '#C1121F';
  var tc = s.likely ? '#1a1a1a' : '#fff';
  var op = s.v1 ? 1 : .65;
  var bc = sv==='Y'?'#2da44e':sv==='N'?'#da3633':sv==='NH'?'#e3b341':sv==='U'?'#7c6fcd':'#228B22';
  var bs = sv||'V';
  return L.divIcon({
    html:'<div style="position:relative;opacity:'+op+'"><div style="background:'+bg+';color:'+tc+
      ';width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;'+
      'font-weight:800;font-size:12px;border:3px solid '+(s.v1?'#fff':'rgba(255,255,255,.5)')+
      ';box-shadow:0 2px 10px rgba(0,0,0,.6)">'+s.stop+'</div>'+
      '<div style="position:absolute;bottom:-4px;right:-4px;background:'+bc+
      ';border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;'+
      'font-size:9px;color:#fff;font-weight:900;border:1.5px solid #fff">'+bs+'</div></div>',
    iconSize:[34,38], iconAnchor:[17,17], className:''
  });
}

// ─── EXPORT ──────────────────────────────────────────────────
function buildCSV() {
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-US');
  var timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  var cmap = {Y:'Yes - Will Vote YES', N:'No - Declined', NH:'Not Home', U:'Unsure - Follow Up'};
  var rows = [
    ['Baughman Township 1.75 Mill Levy - Team A Results'],
    ['Exported: ' + dateStr + ' ' + timeStr],
    [''],
    ['Stop','Volunteer','Name','Address','Likely Voter','HH Voters','Annual Levy','Response','Notes']
  ];
  for (var i = 0; i < STOPS.length; i++) {
    var s = STOPS[i]; var rec = sts[i] || {};
    var code = rec.code || ''; var notes = rec.notes || '';
    rows.push([s.stop, s.v1?'A-1':'A-2', s.name, s.addr,
      s.likely?'YES':'', s.hh, '$'+s.levy.toFixed(2),
      cmap[code]||'Not Visited', notes]);
  }
  var yC=0,nC=0,nhC=0,uC=0,nvC=0;
  for (var i = 0; i < STOPS.length; i++) {
    var c=(sts[i]&&sts[i].code)||'';
    if(c==='Y')yC++;else if(c==='N')nC++;else if(c==='NH')nhC++;else if(c==='U')uC++;else nvC++;
  }
  rows.push(['']);
  rows.push(['--- SUMMARY ---','','','','','','','','']);
  rows.push(['Yes',yC,'','No',nC,'','Not Home',nhC,'']);
  rows.push(['Unsure',uC,'','Not Visited',nvC,'','Total',STOPS.length,'']);
  return rows.map(function(row){
    return row.map(function(cell){
      var s=''+cell;
      if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)
        s='"'+s.replace(/"/g,'""')+'"';
      return s;
    }).join(',');
  }).join('\r\n');
}

function openExport() {
  updateProgress();
  var csv = buildCSV();
  document.getElementById('exp-csv-text').value = csv;
  document.getElementById('exp-modal').classList.add('open');
}

function copyCSV() {
  var ta = document.getElementById('exp-csv-text');
  ta.select();
  try {
    var ok = document.execCommand('copy');
    if (ok) { showToast('Copied! Paste into Excel or email to campaign HQ.'); return; }
  } catch(e) {}
  try {
    navigator.clipboard.writeText(ta.value).then(function() {
      showToast('Copied to clipboard!');
    });
  } catch(e) {
    showToast('Select all text above and copy manually.');
  }
}

function tryDownload() {
  var csv = document.getElementById('exp-csv-text').value;
  var now = new Date();
  var fname = 'TeamA_Results_' + now.toLocaleDateString('en-US').replace(/\//g,'-') + '.csv';
  try {
    var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('CSV downloaded!');
  } catch(e) {
    // Fallback: data URI
    var uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    window.open(uri, '_blank');
    showToast('Opening CSV - save from your browser.');
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function(){t.style.display='none';}, 3500);
}

// ─── INIT ─────────────────────────────────────────────────────
buildList();
